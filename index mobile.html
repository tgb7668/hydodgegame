<!DOCTYPE html><html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>융르지마세요</title>
<style>
body {
 margin:0; padding:0; background:#111;
 font-family:'Pretendard', sans-serif;
 display:flex; flex-direction:column; align-items:center; justify-content:center;
 height:100vh; overflow:hidden;
}.game-wrapper { width:100vw; max-width:1000px; aspect-ratio: 1000 / 700; position:relative; }

canvas { width:100%; height:100%; display:block; background:transparent; }

#scoreBoard { position:absolute; top:10px; left:10px; font-size:20px; font-weight:bold; display:none; }

#lobby { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; flex-direction:column; align-items:center; justify-content:center; }

.start-btn { padding:15px 40px; font-size:20px; }

#resultBoard { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.9); padding:20px; border-radius:15px; }

/* 🔥 조이스틱 중앙 고정 */ .joystick-area { width:100%; height:140px; display:flex; justify-content:center; align-items:center; }

.joystick { width:120px; height:120px; border-radius:50%; border:2px solid rgba(255,255,255,0.3); position:relative; touch-action:none; }

.stick { width:50px; height:50px; background:#ffcf00; border-radius:50%; position:absolute; top:35px; left:35px; } </style>

</head>
<body><div class="game-wrapper">
 <canvas id="gameCanvas" width="1000" height="700"></canvas>
 <div id="scoreBoard">SCORE: 0</div> <div id="lobby">
  <h1>융르지마세요</h1>
  <button class="start-btn" onclick="startGame()">START</button>
 </div> <div id="resultBoard">
  <h2>GAME OVER</h2>
  <p id="finalScoreTxt"></p>
  <button onclick="location.reload()">RETRY</button>
 </div>
</div><div class="joystick-area">
 <div class="joystick" id="joystick">
  <div class="stick" id="stick"></div>
 </div>
</div><script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const joystick = document.getElementById('joystick');
const stick = document.getElementById('stick');
const scoreBoard = document.getElementById('scoreBoard');
const lobby = document.getElementById('lobby');
const resultBoard = document.getElementById('resultBoard');

const player = { x:500, y:350, radius:28, speed:6 };
let enemies=[], score=0, gameOver=false, isStarted=false;

let joyDX=0, joyDY=0;

function startGame(){
 isStarted=true;
 lobby.style.display='none';
 scoreBoard.style.display='block';
 player.x = 500; // 🔥 중앙 시작
 player.y = 350;
 animate();
}

// 🔥 조이스틱
joystick.addEventListener('touchmove', e=>{
 e.preventDefault();
 const rect=joystick.getBoundingClientRect();
 const t=e.touches[0];
 let x=t.clientX-rect.left-60;
 let y=t.clientY-rect.top-60;
 const dist=Math.hypot(x,y);
 const max=50;
 if(dist>max){ x=x/dist*max; y=y/dist*max; }
 stick.style.left=(x+60-25)+'px';
 stick.style.top=(y+60-25)+'px';
 joyDX=x/max; joyDY=y/max;
},{passive:false});

joystick.addEventListener('touchend', ()=>{
 joyDX=0; joyDY=0;
 stick.style.left='35px'; stick.style.top='35px';
});

function spawnEnemy(){
 const x = Math.random()*1000;
 const y = Math.random()*700;
 const angle = Math.atan2(player.y-y, player.x-x);
 const speed = 2 + Math.random()*2;
 enemies.push({ x,y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed, radius:20 });
}

function update(){
 if(gameOver||!isStarted) return;

 let dx=joyDX, dy=joyDY;
 const len=Math.hypot(dx,dy);
 if(len>0){ dx/=len; dy/=len; }

 player.x += dx * player.speed * 3.5;
 player.y += dy * player.speed * 3.5;

 player.x = Math.max(player.radius, Math.min(1000-player.radius, player.x));
 player.y = Math.max(player.radius, Math.min(700-player.radius, player.y));

 enemies.forEach(e=>{
  e.x+=e.vx; e.y+=e.vy;
  const d=Math.hypot(player.x-e.x, player.y-e.y);
  if(d < player.radius + e.radius){ gameOver=true; resultBoard.style.display='block'; }
 });

 score+=0.1;
 scoreBoard.innerText='SCORE: '+Math.floor(score);
 if(Math.random()<0.03) spawnEnemy();
}

function draw(){
 ctx.clearRect(0,0,1000,700);

 ctx.beginPath(); ctx.arc(player.x,player.y,player.radius,0,Math.PI*2);
 ctx.fillStyle='#ffcf00'; ctx.fill();

 enemies.forEach(e=>{
  ctx.beginPath(); ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);
  ctx.fillStyle='#ff4d4d'; ctx.fill();
 });
}

function animate(){
 if(gameOver) return;
 update();
 draw();
 requestAnimationFrame(animate);
}
</script></body>
</html>
