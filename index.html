<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>융르지마세융</title>
    <style>
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            background-color: #111; background-image: url('background.png'); 
            background-size: 100% 100%; background-repeat: no-repeat; background-position: center;
            font-family: 'Pretendard', sans-serif; color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            user-select: none;
        }

        .game-wrapper { position: relative; width: 1000px; height: 700px; z-index: 1; }
        canvas { display: block; background-color: transparent; }
        
        #scoreBoard { 
            position: absolute; top: 25px; left: 25px; font-size: 32px; font-weight: 900; 
            z-index: 5; display: none; text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }
        
        /* 로비 디자인 복구 */
        #lobby {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
            border-radius: 20px; backdrop-filter: blur(5px);
        }
        #lobby h1 { font-size: 90px; color: #ffcf00; margin: 0 0 40px 0; text-shadow: 0 0 20px rgba(0,0,0,1); }

        /* 랭킹 UI 복구 */
        #lobbyRanking {
            position: absolute; bottom: 30px; left: 30px; width: 260px;
            background: rgba(0, 0, 0, 0.7); padding: 20px; border-radius: 15px;
            border: 1px solid rgba(255, 207, 0, 0.5); text-align: left;
        }
        #lobbyRanking h3 { margin: 0 0 10px 0; color: #ffcf00; border-bottom: 1px solid #444; }
        #lobbyRanking ul { list-style: none; padding: 0; margin: 0; }
        #lobbyRanking li { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }

        /* 결과 창 */
        #resultBoard {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9); padding: 40px; border-radius: 20px; border: 4px solid #ffcf00;
            width: 400px; z-index: 20; text-align: center;
        }

        .controls {
            width: 1000px; height: 220px; display: flex; justify-content: center; 
            align-items: center; background: rgba(0,0,0,0.3); border-radius: 0 0 20px 20px;
        }

        #joystick-container {
            width: 160px; height: 160px; border-radius: 50%;
            border: 3px solid rgba(255, 207, 0, 0.5); background: rgba(255, 255, 255, 0.05);
            position: relative; touch-action: none; cursor: pointer;
        }

        #joystick-knob {
            width: 70px; height: 70px; background: #ffcf00; border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(0,0,0,0.5); pointer-events: none;
        }

        .start-btn {
            background: #ffcf00; border: none; padding: 25px 80px; cursor: pointer;
            font-weight: bold; font-size: 35px; border-radius: 60px; color: #000;
            transition: all 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .start-btn:hover { transform: scale(1.1); background: #fff; }
        .retry-btn { background: #ffcf00; border: none; padding: 15px 40px; cursor: pointer; font-weight: bold; border-radius: 10px; font-size: 20px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <canvas id="gameCanvas" width="1000" height="700"></canvas>
        <div id="scoreBoard">SCORE: 0</div>

        <div id="lobby">
            <h1>융르지마세융</h1>
            <button class="start-btn" onclick="startGame()">START</button>
            
            <div id="lobbyRanking">
                <h3>🏆 RANKING</h3>
                <ul id="lobbyRankingList"><li>Loading...</li></ul>
            </div>
        </div>

        <div id="resultBoard">
            <h2 style="color: #ffcf00; font-size: 45px; margin: 0;">GAME OVER</h2>
            <p id="finalScoreTxt" style="font-size: 24px; margin: 20px 0;"></p>
            <button class="retry-btn" onclick="location.reload()">RETRY</button>
        </div>
    </div>

    <div class="controls">
        <div id="joystick-container">
            <div id="joystick-knob"></div>
        </div>
    </div>

    <audio id="bgm" src="bgm.mp3" loop></audio>
    <audio id="hitSound" src="hit.mp3"></audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreBoard = document.getElementById('scoreBoard');
        const lobby = document.getElementById('lobby');
        const resultBoard = document.getElementById('resultBoard');
        const bgm = document.getElementById('bgm');
        const hitSound = document.getElementById('hitSound');

        // GAS URL 복구 (사용자의 URL을 입력하세요)
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyM5kd7tzvllmBbZUtIcflTzLDWirV2a5QoyzKBY4q-G0vfoSkIgp8jw5xlQdX57OfEjA/exec";

        const imgs = { player: new Image(), normal: new Image(), homing: new Image(), giant: new Image(), teleport: new Image() };
        imgs.player.src = 'player.png';
        imgs.normal.src = 'enemy_normal.png';
        imgs.homing.src = 'enemy_homing.png';
        imgs.giant.src = 'enemy_giant.png';
        imgs.teleport.src = 'enemy_teleport.png';

        const status = { player: false, normal: false, homing: false, giant: false, teleport: false };
        Object.keys(imgs).forEach(k => imgs[k].onload = () => status[k] = true);

        const player = { x: 500, y: 350, radius: 28, speed: 6.2, invincible: false };
        let enemies = [], score = 0, gameOver = false, isStarted = false, keys = {};
        const MAX_ENEMIES = 30;

        // --- 랭킹 함수 복구 ---
        async function fetchRanking() {
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                document.getElementById('lobbyRankingList').innerHTML = data.slice(0, 10).map((it, idx) => 
                    `<li><span>${idx+1}. ${it.name}</span><span>${it.score}</span></li>`
                ).join('');
            } catch(e) { document.getElementById('lobbyRankingList').innerHTML = "<li>Offline</li>"; }
        }
        fetchRanking();

        // --- 조이스틱 로직 (마우스+터치 통합) ---
        let joystick = { x: 0, y: 0, active: false };
        const knob = document.getElementById('joystick-knob');
        const container = document.getElementById('joystick-container');
        const limit = 80; 
        const JOYSTICK_SENSITIVITY = 0.5;

        function moveJoystick(clientX, clientY) {
            const rect = container.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            let dx = clientX - centerX;
            let dy = clientY - centerY;
            const distance = Math.sqrt(dx*dx + dy*dy);
            if (distance > limit) { dx = (dx / distance) * limit; dy = (dy / distance) * limit; }
            joystick.x = (dx / limit) * JOYSTICK_SENSITIVITY;
            joystick.y = (dy / limit) * JOYSTICK_SENSITIVITY;
            knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        }

        container.addEventListener('touchstart', (e) => { joystick.active = true; moveJoystick(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener('touchmove', (e) => { if (joystick.active) moveJoystick(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener('touchend', () => { joystick.active = false; resetJoystick(); });
        container.addEventListener('mousedown', (e) => { joystick.active = true; moveJoystick(e.clientX, e.clientY); });
        window.addEventListener('mousemove', (e) => { if (joystick.active) moveJoystick(e.clientX, e.clientY); });
        window.addEventListener('mouseup', () => { joystick.active = false; resetJoystick(); });

        function resetJoystick() { joystick.x = 0; joystick.y = 0; knob.style.transform = `translate(-50%, -50%)`; }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function startGame() {
            isStarted = true;
            lobby.style.display = 'none';
            scoreBoard.style.display = 'block';
            try { bgm.play(); } catch(e) {}
            player.invincible = true;
            setTimeout(() => player.invincible = false, 1500);
            animate();
        }

        function spawnEnemy() {
            if (enemies.length >= MAX_ENEMIES) return;
            const side = Math.floor(Math.random() * 4);
            let x, y;
            if (side === 0) { x = Math.random() * 1000; y = -100; }
            else if (side === 1) { x = Math.random() * 1000; y = 800; }
            else if (side === 2) { x = -100; y = Math.random() * 700; }
            else { x = 1100; y = Math.random() * 700; }

            const angle = Math.atan2(player.y - y, player.x - x);
            const baseSpeed = 0.7 + (score / 300); 
            let type = 'normal', radius = 24, speed = baseSpeed + Math.random() * 1.5, color = '#ff4d4d';

            const rand = Math.random();
            if (score >= 1500 && rand < 0.12) {
                type = 'teleport'; x = player.x + Math.cos(Math.random()*6)*400; y = player.y + Math.sin(Math.random()*6)*400;
                speed = baseSpeed * 0.45; color = '#00ffff';
            } else if (score >= 1000 && rand < 0.18) {
                type = 'giant'; radius = 55; speed = baseSpeed * 0.55; color = '#ff00ff';
            } else if (score >= 500 && rand < 0.22) {
                type = 'homing'; speed = baseSpeed * 0.95; color = '#ffa500';
            }
            enemies.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, radius, type, speed, color, isHomingActive: true });
        }

        function update() {
            if (gameOver || !isStarted) return;
            let moveX = 0, moveY = 0;
            if (keys['ArrowUp']) moveY -= 1;
            if (keys['ArrowDown']) moveY += 1;
            if (keys['ArrowLeft']) moveX -= 1;
            if (keys['ArrowRight']) moveX += 1;
            if (joystick.active) { moveX = joystick.x; moveY = joystick.y; }

            const mag = Math.sqrt(moveX * moveX + moveY * moveY);
            if (mag > 0) {
                if (mag > 1) { moveX /= mag; moveY /= mag; }
                player.x += moveX * player.speed;
                player.y += moveY * player.speed;
            }

            player.x = Math.max(player.radius, Math.min(1000 - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(700 - player.radius, player.y));

            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const dist = Math.sqrt((player.x-e.x)**2 + (player.y-e.y)**2);
                if (e.type === 'homing' && e.isHomingActive) {
                    if (dist > 250) {
                        const targetAngle = Math.atan2(player.y-e.y, player.x-e.x);
                        e.vx = Math.cos(targetAngle)*e.speed; e.vy = Math.sin(targetAngle)*e.speed;
                    } else e.isHomingActive = false;
                }
                e.x += e.vx; e.y += e.vy;
                if (!player.invincible && dist < (player.radius + e.radius - 6)) {
                    hitSound.currentTime = 0; hitSound.play(); bgm.pause();
                    gameOver = true;
                    const finalScore = Math.floor(score);
                    document.getElementById('finalScoreTxt').innerText = `SCORE: ${finalScore}`;
                    resultBoard.style.display = "block";
                    scoreBoard.style.display = "none";
                    
                    // 게임 종료 후 랭킹 등록 팝업 복구
                    setTimeout(() => {
                        const name = prompt("랭킹에 이름을 남겨주세요!", "익명");
                        if(name) fetch(`${GAS_URL}?name=${encodeURIComponent(name)}&score=${finalScore}`);
                    }, 100);
                    return;
                }
                if (e.x < -600 || e.x > 1600 || e.y < -600 || e.y > 1300) enemies.splice(i, 1);
            }
            score += 0.05;
            scoreBoard.innerText = `SCORE: ${Math.floor(score)}`;
            if (Math.random() < 0.04 + (score/10000)) spawnEnemy();
        }

        function animate() {
            if (gameOver) return;
            ctx.clearRect(0, 0, 1000, 700);
            enemies.forEach(e => {
                ctx.save();
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2); ctx.clip();
                if (status[e.type]) {
                    const sz = e.radius * 2.4;
                    ctx.drawImage(imgs[e.type], e.x - sz/2, e.y - sz/2, sz, sz);
                } else { ctx.fillStyle = e.color; ctx.fill(); }
                if (e.type !== 'normal') { ctx.strokeStyle = e.color; ctx.lineWidth = 5; ctx.stroke(); }
                ctx.restore();
            });
            ctx.save();
            if (player.invincible && Math.floor(Date.now()/100)%2===0) ctx.globalAlpha = 0.3;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.clip();
            if (status.player) {
                const sz = player.radius * 2.4;
                ctx.drawImage(imgs.player, player.x - sz/2, player.y - sz/2, sz, sz);
            } else { ctx.fillStyle = '#ffcf00'; ctx.fill(); }
            ctx.restore();
            update();
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
