<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>흐융 닷지 게임</title>
    <style>
        body { text-align: center; background-color: #111; color: white; font-family: 'Pretendard', sans-serif; margin: 0; overflow: hidden; }
        .container { position: relative; display: inline-block; margin-top: 20px; }
        canvas { background-color: #222; display: block; border: 4px solid #444; border-radius: 8px; }
        
        /* UI 레이어 */
        #scoreBoard { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; pointer-events: none; z-index: 5; display: none; }
        
        /* 로비 화면 디자인 */
        #lobby {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }
        #lobby h1 { font-size: 70px; color: #ffcf00; margin: 0 0 40px 0; text-shadow: 0 0 20px rgba(255,207,0,0.5); }
        
        .start-btn {
            background: #ffcf00; border: none; padding: 25px 80px; cursor: pointer;
            font-weight: bold; font-size: 32px; border-radius: 60px; color: #000;
            transition: all 0.2s; box-shadow: 0 0 15px rgba(255,207,0,0.3);
        }
        .start-btn:hover { transform: scale(1.1); background: #fff; box-shadow: 0 0 25px rgba(255,255,255,0.5); }

        /* 좌측 하단 랭킹 보드 */
        #lobbyRanking {
            position: absolute; bottom: 30px; left: 30px; width: 250px;
            background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px;
            border: 1px solid rgba(255, 207, 0, 0.5); text-align: left;
            backdrop-filter: blur(5px);
        }
        #lobbyRanking h3 { margin: 0 0 15px 0; color: #ffcf00; font-size: 18px; border-bottom: 1px solid #555; padding-bottom: 5px; }
        #lobbyRanking ul { list-style: none; padding: 0; margin: 0; font-size: 14px; }
        #lobbyRanking li { display: flex; justify-content: space-between; margin-bottom: 8px; opacity: 0.9; }

        /* 결과창 */
        #resultBoard {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95); padding: 40px; border-radius: 20px; border: 3px solid #ffcf00;
            width: 350px; z-index: 20;
        }
        .retry-btn { background: #ffcf00; border: none; padding: 15px 30px; cursor: pointer; font-weight: bold; border-radius: 10px; font-size: 18px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <canvas id="gameCanvas" width="1000" height="700"></canvas>
        <div id="scoreBoard">점수: 0</div>

        <!-- 로비 -->
        <div id="lobby">
            <h1>흐융 닷지</h1>
            <button class="start-btn" onclick="startGame()">게임 시작</button>
            
            <div id="lobbyRanking">
                <h3>🏆 실시간 랭킹</h3>
                <ul id="lobbyRankingList"><li>데이터 로딩 중...</li></ul>
            </div>
        </div>

        <!-- 결과 창 -->
        <div id="resultBoard">
            <h2 style="color: #ffcf00; font-size: 32px;">GAME OVER</h2>
            <p id="finalScoreTxt" style="font-size: 20px;"></p>
            <button class="retry-btn" onclick="location.reload()">다시 하기</button>
        </div>
    </div>

    <audio id="bgm" src="bgm.mp3" loop></audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreBoard = document.getElementById('scoreBoard');
        const lobby = document.getElementById('lobby');
        const resultBoard = document.getElementById('resultBoard');
        const bgm = document.getElementById('bgm');

        const GAS_URL = "https://script.google.com/macros/s/AKfycbyM5kd7tzvllmBbZUtIcflTzLDWirV2a5QoyzKBY4q-G0vfoSkIgp8jw5xlQdX57OfEjA/exec";

        // 이미지 로딩 시스템 (오류 방지형)
        const imgs = {
            bg: new Image(), player: new Image(),
            normal: new Image(), homing: new Image(), giant: new Image(), teleport: new Image()
        };
        imgs.bg.src = 'background.png';
        imgs.player.src = 'player.png';
        imgs.normal.src = 'enemy_normal.png';
        imgs.homing.src = 'enemy_homing.png';
        imgs.giant.src = 'enemy_giant.png';
        imgs.teleport.src = 'enemy_teleport.png';

        const status = { bg: false, player: false, normal: false, homing: false, giant: false, teleport: false };
        Object.keys(imgs).forEach(k => imgs[k].onload = () => status[k] = true);

        const player = { x: 500, y: 350, radius: 28, speed: 5.5, invincible: false };
        let enemies = [], score = 0, gameOver = false, isStarted = false, keys = {};
        const MAX_ENEMIES = 25;

        // 랭킹 불러오기
        async function fetchRanking() {
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                document.getElementById('lobbyRankingList').innerHTML = data.slice(0, 10).map((it, idx) => 
                    `<li><span>${idx+1}. ${it.name}</span><span>${it.score}</span></li>`
                ).join('');
            } catch(e) { document.getElementById('lobbyRankingList').innerHTML = "<li>랭킹 데이터를 불러올 수 없습니다.</li>"; }
        }
        fetchRanking();

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function startGame() {
            isStarted = true;
            lobby.style.display = 'none';
            scoreBoard.style.display = 'block';
            
            // 음악 재생 (실패해도 게임은 시작)
            try { bgm.play(); } catch(e) { console.log("BGM 재생 실패"); }
            
            player.invincible = true;
            setTimeout(() => player.invincible = false, 1500);
            
            animate();
        }

        function spawnEnemy() {
            if (enemies.length >= MAX_ENEMIES) return;
            const side = Math.floor(Math.random() * 4);
            let x, y;
            if (side === 0) { x = Math.random() * 1000; y = -100; }
            else if (side === 1) { x = Math.random() * 1000; y = 800; }
            else if (side === 2) { x = -100; y = Math.random() * 700; }
            else { x = 1100; y = Math.random() * 700; }

            const angle = Math.atan2(player.y - y, player.x - x);
            const baseSpeed = 1.0 + (score / 400); 
            let type = 'normal', radius = 24, speed = baseSpeed + Math.random() * 1.0, color = '#ff4d4d';

            const rand = Math.random();
            if (score >= 1500 && rand < 0.1) {
                type = 'teleport'; x = player.x + Math.cos(Math.random()*6)*250; y = player.y + Math.sin(Math.random()*6)*250;
                speed = baseSpeed * 0.4; color = '#00ffff';
            } else if (score >= 1000 && rand < 0.15) {
                type = 'giant'; radius = 55; speed = baseSpeed * 0.5; color = '#ff00ff';
            } else if (score >= 500 && rand < 0.5) {
                type = 'homing'; speed = baseSpeed * 0.9; color = '#ffa500';
            }

            enemies.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, radius, type, speed, color, isHomingActive: true });
        }

        function update() {
            if (gameOver || !isStarted) return;

            if (keys['ArrowUp'] && player.y > player.radius) player.y -= player.speed;
            if (keys['ArrowDown'] && player.y < 700 - player.radius) player.y += player.speed;
            if (keys['ArrowLeft'] && player.x > player.radius) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < 1000 - player.radius) player.x += player.speed;

            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const dist = Math.sqrt((player.x-e.x)**2 + (player.y-e.y)**2);

                if (e.type === 'homing' && e.isHomingActive) {
                    if (dist > 250) {
                        const targetAngle = Math.atan2(player.y-e.y, player.x-e.x);
                        e.vx = Math.cos(targetAngle)*e.speed; e.vy = Math.sin(targetAngle)*e.speed;
                    } else e.isHomingActive = false;
                }
                e.x += e.vx; e.y += e.vy;
                
                if (!player.invincible && dist < (player.radius + e.radius - 5)) {
                    gameOver = true;
                    const finalScore = Math.floor(score);
                    document.getElementById('finalScoreTxt').innerText = `최종 점수: ${finalScore}점`;
                    resultBoard.style.display = "block";
                    scoreBoard.style.display = "none";
                    
                    const name = prompt("랭킹 등록 이름을 입력하세요", "익명");
                    if(name) fetch(`${GAS_URL}?name=${encodeURIComponent(name)}&score=${finalScore}`);
                }
                if (e.x < -600 || e.x > 1600 || e.y < -600 || e.y > 1300) enemies.splice(i, 1);
            }
            score += 0.05;
            scoreBoard.innerText = `점수: ${Math.floor(score)}`;
            if (Math.random() < 0.03 + (score/15000)) spawnEnemy();
        }

        function animate() {
            if (gameOver) return;
            ctx.clearRect(0, 0, 1000, 700);
            
            // 배경
            if (status.bg) ctx.drawImage(imgs.bg, 0, 0, 1000, 700);
            else { ctx.fillStyle = '#111'; ctx.fillRect(0,0,1000,700); }

            // 적
            enemies.forEach(e => {
                ctx.save();
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2); ctx.clip();
                if (status[e.type]) {
                    const sz = e.radius * 2.4;
                    ctx.drawImage(imgs[e.type], e.x - sz/2, e.y - sz/2, sz, sz);
                } else { ctx.fillStyle = e.color; ctx.fill(); }
                if (e.type !== 'normal') { ctx.strokeStyle = e.color; ctx.lineWidth = 4; ctx.stroke(); }
                ctx.restore();
            });

            // 플레이어
            ctx.save();
            if (player.invincible && Math.floor(Date.now()/100)%2===0) ctx.globalAlpha = 0.3;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.clip();
            if (status.player) {
                const sz = player.radius * 2.4;
                ctx.drawImage(imgs.player, player.x - sz/2, player.y - sz/2, sz, sz);
            } else { ctx.fillStyle = '#00d4ff'; ctx.fill(); }
            ctx.restore();

            update();
            requestAnimationFrame(animate);
        }

        // 초기 화면 (로비 상태 배경)
        setTimeout(() => {
            if (status.bg) ctx.drawImage(imgs.bg, 0, 0, 1000, 700);
            else { ctx.fillStyle = '#222'; ctx.fillRect(0,0,1000,700); }
        }, 100);

    </script>
</body>
</html>
